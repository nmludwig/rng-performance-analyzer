<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RC Performance Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #062E5C;
      background: linear-gradient(160deg, #062E5C 0%, #04223f 55%, #03182d 100%);
      background-attachment: fixed;
      color: #1a1a2e;
      min-height: 100vh;
    }
    nav {
      background: #03182d;
      border-bottom: 2px solid #FF7A00;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .brand { color: #ff7a00; font-weight: 700; font-size: 1.1rem; letter-spacing: 0.02em; }
    nav a { color: #cdd9ea; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: #FF7A00; }
    .container { max-width: 860px; margin: 0 auto; padding: 2rem 1rem; }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.2rem; margin-bottom: 1rem; color: #333; }
    .subtitle { color: #666; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .btn {
      display: inline-block;
      padding: 0.65rem 1.6rem;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary { background: #ff7a00; color: #fff; }
    .btn-secondary { background: #1a1a2e; color: #fff; }
    .btn-outline { background: transparent; border: 2px solid #ff7a00; color: #ff7a00; }
    .flash {
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #664d00;
      padding: 0.8rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    label { display: block; font-weight: 600; margin-bottom: 0.35rem; font-size: 0.92rem; }
    input[type=text], input[type=password], input[type=number], input[type=email] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #ff7a00; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  </style>
</head>
<body>
<nav>
  <span class="brand">RC Performance Analyzer</span>
  {% if session.get('authed') %}<a href="/logout">Sign out</a>{% endif %}
</nav>
<div class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
