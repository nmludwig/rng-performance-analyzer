{% extends "base.html" %}
{% block content %}
<div style="max-width:420px;margin:3.5rem auto;">
  <div class="card" style="padding-top:2rem;">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="font-weight:800;font-size:1.35rem;letter-spacing:-0.5px;color:#062E5C;">
        Ring<span style="color:#FF8800;">Central</span>
      </div>
      <p style="color:#888;font-size:0.8rem;margin-top:0.25rem;letter-spacing:0.5px;text-transform:uppercase;">
        Performance Analyzer
      </p>
    </div>

    <h1 style="margin-bottom:0.25rem;font-size:1.25rem;">Sign in with your RingCentral account</h1>
    <p class="subtitle">Restricted to RingCentral employees.</p>

    {% if error %}<div class="flash" style="background:#fde8e8;border-color:#e53e3e;color:#7b1d1d;">{{ error }}</div>{% endif %}

    <form method="POST">
      <label for="email">RingCentral email</label>
      <input type="email" id="email" name="email" placeholder="you@ringcentral.com"
             autocomplete="username" autofocus required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             autocomplete="current-password" required>

      <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Sign in</button>
    </form>

    <p style="text-align:center;color:#aaa;font-size:0.75rem;margin-top:1.5rem;margin-bottom:0;">
      Internal tool · RingCentral employees only
    </p>
  </div>
</div>
{% endblock %}
