services:
  - type: web
    name: rng-performance-analyzer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180 --workers 2
    envVars:
      # Pin a stable interpreter. Without this Render picks the newest Python
      # (3.14.x), which has no stable pandas/numpy wheels — generation crashed
      # with a native SIGSEGV (worker "code 139"). 3.12 has known-good wheels.
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      # RingCentral corporate SSO (login). Register the redirect URI in the RC
      # OAuth app: https://<host>/oauth/callback
      - key: RC_CLIENT_ID
        sync: false
      - key: RC_CLIENT_SECRET
        sync: false
      - key: RC_REDIRECT_URI
        sync: false
